services:
  main:
    image: alpine:latest
    command: sh -c "sleep infinity"
    read_only: true
    ipc: shareable
    pids_limit: 50
    networks:
      net:
        aliases:
          - myalias
        ipv4_address: 10.0.0.2
    healthcheck:
      test: ["CMD", "true"]
      interval: 30s
      start_period: 40s

networks:
  net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.1
