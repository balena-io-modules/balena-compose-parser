- commits:
    - subject: Throw error with correct serviceName on long syntax depends_on error
      hash: 3408cb26a65482dd7694376c09de9f461fdad8e9
      body: >
        Given a service `main` that expresses long syntax depends_on on service

        `other`, if the long syntax depends_on config is not supported, this
        commit

        corrects the thrown ServiceError to reference `main` instead of `other`,
        as

        `main` is the service config with the unsupported depends_on config, not
        `other`.
