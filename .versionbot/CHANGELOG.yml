- commits:
    - subject: Rename binary to snakecase and add .exe for windows in postinstall
      hash: 764fdcf67831120284d2b0ecd3951ac906fd846f
      body: |
        node-pre-gyp expects binaries without dashes, and renaming to add .exe
        for windows is easier in postinstall as module_name in package.json
        is only defined as balena_compose_go. This doesn't support a windows
        binary which would have been named balena_compose_go.exe.
      footer:
        Change-type: patch
        change-type: patch
        Signed-off-by: Christina Ying Wang <christina@balena.io>
        signed-off-by: Christina Ying Wang <christina@balena.io>
